<div class="dashboard-container">
  @if ((pageData$ | async); as pageData) {
  <div class="dashboard-content">
    <!-- Top Row: Accounts Component with Split Layout (Full Width) -->
    <app-accounts
      [pageData]="pageData"
      (editTransaction)="onEditTransaction($event)">
    </app-accounts>

    <!-- Bottom Row: 50/50 Split -->
    <div class="bottom-content-row">
      <!-- Left: Financial Summary Section -->
      <app-fin-summary [pageData]="pageData"></app-fin-summary>

      <!-- Right: Common Withdrawals -->
      <div class="card">
        <app-common-withdrawals [pageData]="pageData"></app-common-withdrawals>
      </div>
    </div>
  </div>
  } @else {
  <div class="loading-state">
    <p>Loading dashboard...</p>
  </div>
  }

  <!-- Transaction Edit Modal -->
  @if (showEditTransactionModal && editingTransaction) {
    <app-edit-transaction-modal
      [transaction]="editingTransaction"
      (closed)="onCloseEditTransactionModal()"
      (transactionUpdated)="onTransactionUpdated()"
    ></app-edit-transaction-modal>
  }
</div>
