<div class="balances-list-container">
  <h3 class="section-title">Accounts</h3>
  <div class="table-wrapper">
    <table class="balances-table">
      <thead>
        <tr>
          <th>Account</th>
          <th class="text-right">Balance</th>
        </tr>
      </thead>
      <tbody>
        @for (row of balanceRows; track row.accountName) {
        <tr [class.total-row]="row.isTotal">
          <td>{{ row.accountName }}</td>
          <td class="text-right" [class.total-amount]="row.isTotal" [style.color]="row.balance < 0 ? (activeUser?.negative_color || '#ff6b6b') : 'inherit'">
            {{ row.balance | formatCurrency }}
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
