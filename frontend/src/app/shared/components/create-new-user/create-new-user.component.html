@if (isOpen) {
  <div class="modal-overlay" [class.no-click-close]="isRequired" (click)="close()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Create New User</h3>
        @if (!isRequired) {
          <button class="close-btn" (click)="close()">×</button>
        }
      </div>
      <div class="modal-body">
        @if (isRequired) {
          <p class="required-message">A user must be created to continue.</p>
        }
        <div class="form-group">
          <label>User Name</label>
          <input
            type="text"
            [(ngModel)]="newUserName"
            placeholder="Enter new user name"
            class="form-input"
            (keyup.enter)="createUser()"
          />
        </div>
      </div>
      <div class="modal-footer">
        @if (!isRequired) {
          <button class="btn-cancel" (click)="close()">
            Cancel
          </button>
        }
        <button class="btn-save" (click)="createUser()">
          Create User
        </button>
      </div>
    </div>
  </div>
}
