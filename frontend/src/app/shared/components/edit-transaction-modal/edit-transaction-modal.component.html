<div class="modal-overlay" (clickOutside)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Edit transaction - #{{ transaction.id }}</h2>
      <button class="close-btn" (click)="close()">×</button>
    </div>

    <div class="modal-body">
      <!-- Error message -->
      @if (error) {
        <div class="error-message">
          {{ error }}
        </div>
      }

      <form class="transaction-form">
        <!-- Date and Type Row -->
        <div class="form-row">
          <div class="form-group">
            <label for="date">Date</label>
            <input
              id="date"
              type="date"
              [(ngModel)]="date"
              name="date"
              required
            />
          </div>

          <div class="form-group type-selector">
            <label>Type</label>
            <div class="type-buttons">
              <button
                type="button"
                class="type-btn"
                [class.active]="type === 'W'"
                (click)="selectType('W')"
              >
                Withdrawal
              </button>
              <button
                type="button"
                class="type-btn"
                [class.active]="type === 'D'"
                (click)="selectType('D')"
              >
                Deposit
              </button>
              <button
                type="button"
                class="type-btn"
                [class.active]="type === 'TW'"
                (click)="selectType('TW')"
              >
                Transfer<br />Out
              </button>
              <button
                type="button"
                class="type-btn"
                [class.active]="type === 'TD'"
                (click)="selectType('TD')"
              >
                Transfer<br />In
              </button>
            </div>
          </div>
        </div>

        <!-- Account and Category Row -->
        <div class="form-row">
          <div class="form-group">
            <label for="account">Account</label>
            <select id="account" [(ngModel)]="account" name="account" required>
              <option value="">Select Account</option>
              @for (acc of accounts; track acc.id) {
                <option [value]="acc.name">{{ acc.name }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" [(ngModel)]="category" name="category" required>
              <option value="">Select Category</option>
              @for (cat of getCategoriesByType(); track cat.id) {
                <option [value]="cat.name">{{ cat.name }}</option>
              }
            </select>
          </div>
        </div>

        <!-- Amount and Description Row -->
        <div class="form-row">
          <div class="form-group">
            <label for="amount">Amount</label>
            <input
              id="amount"
              type="number"
              step="0.01"
              [(ngModel)]="amount"
              name="amount"
              placeholder="0.00"
              required
            />
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <input
              id="description"
              type="text"
              [(ngModel)]="description"
              name="description"
              placeholder="Enter description"
              list="descriptions"
              required
            />
            <datalist id="descriptions">
              @for (desc of descriptions; track desc.id) {
                <option [value]="desc.description"></option>
              }
            </datalist>
          </div>
        </div>

        <!-- Notes -->
        <div class="form-group full-width">
          <label for="note">Note</label>
          <textarea
            id="note"
            [(ngModel)]="note"
            name="note"
            rows="3"
            placeholder="Enter optional notes"
            maxlength="500"
          ></textarea>
        </div>

        <!-- Pending Checkbox -->
        <div class="form-group checkbox-group">
          <input
            id="pending"
            type="checkbox"
            [(ngModel)]="pending"
            name="pending"
          />
          <label for="pending">Pending</label>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" (click)="close()" [disabled]="loading">
        Cancel
      </button>
      <button
        class="btn-primary"
        (click)="submit()"
        [disabled]="loading"
      >
        {{ loading ? 'Updating...' : 'Save changes' }}
      </button>
    </div>
  </div>
</div>
