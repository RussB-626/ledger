<aside class="sidenav" [class.expanded]="isExpanded">
  <!-- Top Content -->
  <div class="sidenav-top">
    <!-- Ledger Logo Section / Toggle Button -->
    <div class="logo-section">
      <span class="logo-text" [class.hidden]="!isExpanded">Ledger</span>
      <button class="toggle-btn" (click)="toggleSidenav()" title="Toggle Sidenav">
        <i class="bi bi-window-sidebar"></i>
      </button>
    </div>

    <!-- Navigation Icons -->
    <div class="sidenav-divider"></div>
    <div class="nav-icons">
      <button class="nav-icon" (click)="navigateToDashboard()" title="Dashboard">
        <img src="/assets/icons/house-fill.svg" alt="Dashboard" class="icon-img">
        <span class="nav-label" [class.hidden]="!isExpanded">Dashboard</span>
      </button>
      <button class="nav-icon" (click)="navigateToAdmin()" title="Admin">
        <img src="/assets/icons/gear-fill.svg" alt="Admin" class="icon-img">
        <span class="nav-label" [class.hidden]="!isExpanded">Admin</span>
      </button>
    </div>

    <!-- Group and New Transaction Section -->
    <div class="sidenav-divider"></div>

    <!-- Group Selector -->
    @if (!isOnAdminPage()) {
      <div class="group-section-top">
        <button class="group-initial-btn" (click)="openGroupManagementPanel()" [title]="(activeGroup$ | async)?.name || 'Select Group'">
          <i class="bi bi-folder2"></i>
          <span class="group-initial">{{ getActiveGroupInitial() }}</span>
        </button>
        <span class="group-name" [class.hidden]="!isExpanded">{{ (activeGroup$ | async)?.name }}</span>
      </div>
    }

    <!-- New Transaction Button Section -->
    <div class="new-transaction-section">
      @if (!isOnAdminPage()) {
        <button class="btn-new-transaction" (click)="openCreateTransactionModal()" title="New Transaction">
          <i class="bi bi-plus-square"></i>
          <span class="nav-label" [class.hidden]="!isExpanded">New Transaction</span>
        </button>
      }
    </div>
  </div>

  <!-- User Section (Bottom) -->
  <div class="sidenav-bottom">
    <div class="user-section">
      <button class="user-initial-btn" (click)="openUserManagementPanel()" [title]="(activeUser$ | async)?.name || 'Select User'">
        <span class="user-initial">{{ getActiveUserInitial() }}</span>
      </button>
      <span class="user-name" [class.hidden]="!isExpanded">{{ (activeUser$ | async)?.name }}</span>
    </div>
  </div>
</aside>

@if (showCreateTransactionModal) {
  <app-create-transaction-modal
    (closed)="closeCreateTransactionModal()"
    (transactionCreated)="onTransactionCreated()"
  ></app-create-transaction-modal>
}

<app-group-management-panel
  [isOpen]="groupManagementPanelOpen"
  (closed)="closeGroupManagementPanel()"
></app-group-management-panel>

<app-user-management-panel
  [isOpen]="userManagementPanelOpen"
  (closed)="closeUserManagementPanel()"
></app-user-management-panel>
