<aside class="sidenav">
  <!-- Ledger Logo Section -->
  <div class="logo-section">
    <img src="/assets/favicon.ico" alt="Ledger" class="logo-icon">
    <span class="logo-text">Ledger</span>
  </div>

  <!-- User Section -->
  <div class="sidenav-spacer"></div>
  <div class="user-section">
    <button class="user-initial-btn" (click)="openUserManagementPanel()" [title]="(activeUser$ | async)?.name || 'Select User'">
      <span class="user-initial">{{ getActiveUserInitial() }}</span>
    </button>
  </div>

  <!-- Navigation Divider -->
  <div class="sidenav-divider"></div>

  <!-- Navigation Icons -->
  <div class="nav-icons">
    <button class="nav-icon" (click)="navigateToDashboard()" title="Dashboard" matTooltip="Dashboard" matTooltipPosition="right">
      <img src="/assets/icons/house-fill.svg" alt="Dashboard" class="icon-img">
    </button>
    <button class="nav-icon" (click)="navigateToAdmin()" title="Admin" matTooltip="Admin" matTooltipPosition="right">
      <img src="/assets/icons/gear-fill.svg" alt="Admin" class="icon-img">
    </button>
  </div>

  <!-- New Transaction Button Section -->
  <div class="sidenav-spacer"></div>
  <div class="sidenav-divider"></div>
  <div class="new-transaction-section">
    @if (!isOnAdminPage()) {
      <button class="btn-new-transaction" (click)="openCreateTransactionModal()" title="New Transaction" matTooltip="New Transaction" matTooltipPosition="right">
        <img src="/assets/icons/plus-circle-fill.svg" alt="New Transaction" class="icon-img">
      </button>
    }
  </div>
</aside>

@if (showCreateTransactionModal) {
  <app-create-transaction-modal
    (closed)="closeCreateTransactionModal()"
    (transactionCreated)="onTransactionCreated()"
  ></app-create-transaction-modal>
}

<app-user-management-panel
  [isOpen]="userManagementPanelOpen"
  (closed)="closeUserManagementPanel()"
></app-user-management-panel>
