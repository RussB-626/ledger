@if (isOpen) {
  <div class="panel-overlay" (click)="closePanel()"></div>

  <aside class="user-management-panel">
    <div class="panel-header">
      <h2>Users</h2>
      <button class="close-btn" (click)="closePanel()">×</button>
    </div>

    <div class="panel-content">
      <button class="btn-create-user" (click)="openCreateUserModal()">
        + Create New User
      </button>

      <div class="panel-divider"></div>

      <div class="users-list">
        @for (user of allUsers$ | async; track user.id) {
          <button
            class="user-item"
            [class.active]="(activeUser$ | async)?.id === user.id"
            (click)="switchUser(user)"
          >
            <span class="user-initial">{{ user.name.charAt(0).toUpperCase() }}</span>
            <span class="user-name">{{ user.name }}</span>
          </button>
        }
      </div>
    </div>
  </aside>
}

<app-create-new-user
  [isOpen]="showCreateUserModal"
  (closed)="closeCreateUserModal()"
  (userCreated)="onUserCreated($event)"
></app-create-new-user>
